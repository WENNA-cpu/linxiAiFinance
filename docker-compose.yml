version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lingxi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/persist/lingxi.db
      - SECRET_KEY=${SECRET_KEY:-lingxi-prod-secret-change-me}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - NEW_MODEL_RATIO=${NEW_MODEL_RATIO:-5}
    volumes:
      - lingxi-db:/app/persist
      - ./backend/models:/app/models:ro
      - ./backend/data:/app/data:ro
    restart: unless-stopped
    networks:
      - lingxi-network

volumes:
  lingxi-db:

networks:
  lingxi-network:
    driver: bridge
