# 灵析 AI — 阿里云 ECS Docker Compose
# 前端 8080 | 后端 8000
# 宿主机 Nginx 见 deploy/nginx-ecs.conf

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: lingxi-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/persist/lingxi.db
      SECRET_KEY: ${SECRET_KEY:-lingxi-prod-secret-change-me}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NEW_MODEL_RATIO: ${NEW_MODEL_RATIO:-5}
    volumes:
      - lingxi-db:/app/persist
      - ./backend/models:/app/models:ro
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - lingxi-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: lingxi-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lingxi-network

volumes:
  lingxi-db:

networks:
  lingxi-network:
    driver: bridge
