version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lingxi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./lingxi.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      - MEOO_PROJECT_API_KEY=${MEOO_PROJECT_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
    networks:
      - lingxi-network

networks:
  lingxi-network:
    driver: bridge
