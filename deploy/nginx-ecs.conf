# 阿里云 ECS 宿主机 Nginx — 灵析 + 会议助手同机部署
#
# 安装：
#   sudo cp deploy/nginx-ecs.conf /etc/nginx/conf.d/lingxi-meeting.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前置（两个项目分别 docker compose up -d）：
#   灵析：     8080(前端)  8000(后端)
#   会议助手： 8081(前端)  8001(后端)
#
# 路由规则（按优先级）：
#   /api/meeting/*  → 会议助手后端 8001
#   /api/setting/*  → 会议助手后端 8001
#   /meeting/*      → 会议助手前端 8081
#   /api/*          → 灵析后端 8000
#   /               → 灵析前端 8080

upstream lingxi_web {
    server 127.0.0.1:8080;
}

upstream lingxi_api {
    server 127.0.0.1:8000;
}

upstream meeting_web {
    server 127.0.0.1:8081;
}

upstream meeting_api {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # 会议助手 API
    location /api/meeting/ {
        proxy_pass http://meeting_api/api/meeting/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /api/setting/ {
        proxy_pass http://meeting_api/api/setting/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # 会议助手前端
    location /meeting/ {
        proxy_pass http://meeting_web/meeting/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /meeting {
        return 301 /meeting/;
    }

    # 灵析 API（直连后端，不走前端 Nginx）
    location /api/ {
        proxy_pass http://lingxi_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 灵析前端
    location / {
        proxy_pass http://lingxi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
